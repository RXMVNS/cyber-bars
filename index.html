<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyberjapan Ultrawide CRT Static Overlay</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0) !important; /* Locks background completely transparent */
    }

    /* THE BLACK BAR MASK HOLDERS - Locks bars at top and bottom of screen canvas */
    .cyber-bar {
      position: absolute;
      left: 0;
      width: 100%;
      height: 140px; /* ADJUST THIS PIXEL VALUE to match your black bar thickness */
      overflow: hidden;
      background: rgba(6, 4, 12, 0.96); /* Deep retro synth cockpit backing */
      pointer-events: none;
    }

    .top-bar {
      top: 0;
      border-bottom: 5px solid #ff007f; /* Glowing cyber pink neon bottom edge deck line */
      box-shadow: 0px 6px 22px rgba(255, 0, 127, 0.5);
    }

    .bottom-bar {
      bottom: 0;
      border-top: 5px solid #00f0ff; /* Glowing cyber cyan neon top edge deck line */
      box-shadow: 0px -6px 22px rgba(0, 240, 255, 0.5);
    }

    /* --- PURE CSS HARDWARE TV STATIC ENGINE --- */
    /* Generates high-velocity pixel artifacts via mathematical sub-pixel layout loops */
    .static-noise-layer {
      position: absolute;
      top: -50%;
      left: -50%;
      right: -50%;
      bottom: -50%;
      width: 200%;
      height: 200%;
      
      /* Injects contrasting micro-gradients to form grainy data noise grids */
      background: 
        repeating-radial-gradient(rgba(0, 240, 255, 0.15) 0 0.0001%, rgba(8, 5, 15, 0.4) 0 0.0002%) 50% 0/2000px 2000px,
        repeating-conic-gradient(rgba(255, 0, 127, 0.15) 0 0.0001%, rgba(0, 0, 0, 0.5) 0 0.0002%) 60% 60%/2000px 2000px;
      background-blend-mode: difference;
      
      /* Rapid glitch interval frame loops to mimic old broadcast signals */
      animation: televisionFuzzGlitch 0.15s infinite alternate;
      opacity: 0.65;
    }

    /* THE HOLOGRAM CRT MONITOR HORIZONTAL SCANLINE GRID FILTER */
    .cyber-bar::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 240, 255, 0.12) 50%);
      z-index: 5;
      background-size: 100% 4px; /* Crisp 4px processing lines across bars */
    }

    /* --- RAPID ANALOG SIGNAL NOISE GENERATION LOOP --- */
    @keyframes televisionFuzzGlitch {
      0% { transform: translate(0, 0) scale(1); background-position: 50% 0, 60% 50%; }
      20% { transform: translate(-1px, 2px) scale(1.02); }
      40% { transform: translate(2px, -1px) scale(0.99); background-position: 40% 10%, 70% 30%; }
      60% { transform: translate(-2px, -2px) scale(1.01); }
      80% { transform: translate(1px, 1px) scale(1); background-position: 30% 5%, 50% 40%; }
      100% { transform: translate(-1px, -1px) scale(1.03); background-position: 55% 2%, 65% 48%; }
    }
  </style>
</head>
<body>

  <!-- Top Ultrawide Overlay Bar Frame -->
  <div class="cyber-bar top-bar">
    <div class="static-noise-layer"></div>
  </div>

  <!-- Bottom Ultrawide Overlay Bar Frame -->
  <div class="cyber-bar bottom-bar">
    <div class="static-noise-layer"></div>
  </div>

</body>
</html>
