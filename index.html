<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyberjapan Ultrawide Overlay</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0) !important; /* Locks background completely transparent */
    }

    /* THE BLACK BAR MASK HOLDERS - Locks bars at top and bottom of screen canvas */
    .cyber-bar {
      position: absolute;
      left: 0;
      width: 100%;
      height: 140px; /* ADJUST THIS PIXEL VALUE to match your black bar thickness */
      overflow: hidden;
      background: rgba(8, 5, 15, 0.94); /* Deep retro synth cockpit backing */
      pointer-events: none;
    }

    .top-bar {
      top: 0;
      border-bottom: 5px solid #ff007f; /* Glowing cyber pink neon bottom edge deck line */
      box-shadow: 0px 6px 20px rgba(255, 0, 127, 0.45);
    }

    .bottom-bar {
      bottom: 0;
      border-top: 5px solid #00f0ff; /* Glowing cyber cyan neon top edge deck line */
      box-shadow: 0px -6px 20px rgba(0, 240, 255, 0.45);
    }

    /* THE HOLOGRAM CRT MONITOR SCANLINE FILTER */
    .cyber-bar::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 240, 255, 0.08) 50%);
      z-index: 5;
      background-size: 100% 4px;
    }

    /* INFINITE TRANSITION DRIFT CONTAINERS */
    .cloud-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 200%; /* Spans double-wide to allow loop resetting behind view edges */
      height: 100%;
    }

    /* PURE CSS GENERATED PIXEL ART CLOUDS */
    .clouds-foreground {
      /* Fast Foreground Layer: Interlaced Hot Pink & Cyber Cyan pixel cloud stacks */
      background-image: 
        radial-gradient(circle, #ff007f 10px, transparent 10px),
        radial-gradient(circle, #ff007f 14px, transparent 14px),
        radial-gradient(circle, #00f0ff 8px, transparent 8px),
        radial-gradient(circle, #00f0ff 12px, transparent 12px);
      background-size: 140px 80px, 180px 95px, 200px 85px, 160px 75px;
      background-position: 40px 60px, 200px 50px, 300px 55px, 440px 45px;
      image-rendering: pixelated; /* Directs browser graphics card to keep lines sharp */
      opacity: 0.45;
      z-index: 2;
      animation: driftLeft 26s linear infinite; /* Crawl rate velocity for top layers */
    }

    .clouds-background {
      /* Slow Background Layer: Deep Cyber Purples tucked to create depth dimensions */
      background-image: 
        radial-gradient(circle, #9933ff 12px, transparent 12px),
        radial-gradient(circle, #9933ff 18px, transparent 18px);
      background-size: 240px 100px, 320px 110px;
      background-position: 0px 40px, 120px 30px;
      image-rendering: pixelated;
      opacity: 0.25;
      z-index: 1;
      animation: driftLeft 55s linear infinite; /* Slower drift rate to capture parallax */
    }

    /* INVERTS DRIFT DIRECTION ON THE LOWER BAR FOR ADVANCED SCREEN RHYTHM */
    .bottom-bar .cloud-layer {
      animation-direction: reverse !important; /* Forces bottom clouds to drift right */
    }

    /* --- INFINITE PARALLAX LOOP ENGINE --- */
    @keyframes driftLeft {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); } /* Resets seamlessly mid-stride */
    }
  </style>
</head>
<body>

  <!-- Top Ultrawide Overlay Bar Frame -->
  <div class="cyber-bar top-bar">
    <div class="cloud-layer clouds-background"></div>
    <div class="cloud-layer clouds-foreground"></div>
  </div>

  <!-- Bottom Ultrawide Overlay Bar Frame -->
  <div class="cyber-bar bottom-bar">
    <div class="cloud-layer clouds-background"></div>
    <div class="cloud-layer clouds-foreground"></div>
  </div>

</body>
</html>
